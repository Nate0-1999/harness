name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python lint and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install harness
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: M1 scope fence
        run: .githooks/pre-commit --all
      - name: Lint
        run: ruff check . && ruff format --check src tests
      - name: Test
        run: pytest -m "not contract"

  web:
    name: Web lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  contract:
    name: Live Spine contract tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Checkout pinned Spine
        uses: actions/checkout@v4
        with:
          repository: Nate0-1999/memory-palace
          ref: 9c51c992b6103ee7492961bcb27fb608c4760446
          path: _contract/spine
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install harness
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Run live S1-S2 contract
        env:
          SPINE_SOURCE_DIR: ${{ github.workspace }}/_contract/spine
        run: sh tests/contract/run.sh
