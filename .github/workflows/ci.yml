name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python lint and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install harness
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: M1 scope fence
        run: .githooks/pre-commit --all
      - name: Lint
        run: ruff check . && ruff format --check src tests
      - name: Test
        run: pytest

  web:
    name: Web lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  contract-test-skeleton:
    name: Spine contract tests (H2 skeleton)
    if: ${{ vars.SPINE_CONTRACT_IMAGE != '' }}
    runs-on: ubuntu-latest
    services:
      spine:
        image: ${{ vars.SPINE_CONTRACT_IMAGE }}
        env:
          SPINE_TOKEN: contract-test-token
        ports:
          - 8000:8000
    env:
      SPINE_URL: http://127.0.0.1:8000
      SPINE_TOKEN: contract-test-token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install harness
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Run reserved contract marker
        run: pytest -m contract tests/contract
